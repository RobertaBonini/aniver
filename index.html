<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festivite</title>

  <link rel="stylesheet" href="global.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

</head>
<body>
  <div class="corpo">
  <aside>
    <img src="assets/Logo.svg" alt="comemoração">
    <div>
      <h1>Festivite</h1>
      <p>Crie um convite digital para o seu evento</p>
    </div>
    
  </aside>
  <main>
    <h1>Crie seu convite</h1>
    
    <fieldset>
      <legend> <img src="assets/calendar.png" alt=""> <h2>Sobre o evento</h2></legend>

      <label for="titulo">
        <p>Titulo</p>
        <input type="text" id="titulo">
      </label>
      <label for="init">
        <p>Início</p>
        <input type="date" id="init">
      </label>
      <label for="fim">
        <p>Fim</p>
        <input type="date" id="fim">
      </label>
      <label for="Tipo">
        <p>Tipo</p>
        <input type="text" name="" id="tipo">
      </label>
      <label for="local">
        <p>Local</p>
        <input type="text" name="" id="input">
      </label>
      <label for="desc">
        <p>Descrição</p>
        <textarea name="" id="desc" placeholder="Escreva sobre os detalhes do evento"></textarea>
      </label>
    </fieldset>

  </main>
  </div>
</body>
</html>
